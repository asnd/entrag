name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: .venv/bin/ruff check src/ scripts/ tests/

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -f Dockerfile -t entrag:ci .

      - name: Run tests in container
        run: docker run --rm entrag:ci python -m pytest tests/ -v --tb=short
